apiVersion: v1
kind: Service
metadata:
  name: inference
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
      - name: qwen
        image: your-registry/qwen-inference:latest # Replace with your built image
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_URL
          value: "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q8_0.gguf"
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        emptyDir: {} # Or use PVC for persistent model storage
